<!DOCTYPE html>
<html lang="tr">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Buse & Samet</title>

  <link rel="stylesheet" href="style.css">
  
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

  <!-- =========================
       ÜST ALAN
  ========================== -->

  <header class="hero">

    <p class="welcome">
      Mutluluğumuza ortak olduğunuz için teşekkür ederiz.
    </p>

    <h1>Buse</h1>

    <div class="ampersand">&</div>

    <h1>Samet</h1>

    <p class="date">
      19 Eylül 2026
    </p>
<div class="hero-divider"></div>
  </header>


  <!-- =========================
       FOTOĞRAF YÜKLEME
  ========================== -->

  <section class="upload-section">

    <h2>Düğün Fotoğraf Albümü</h2>

    <p class="description">
      Bu özel günümüzde çektiğiniz fotoğrafları
      bizimle paylaşabilirsiniz.
    </p>

    <input
      type="file"
      id="fileInput"
      accept="image/*">

    <button id="uploadBtn">

  <svg class="camera-icon" viewBox="0 0 24 24">
    <path d="M9 3L7.5 5H4C2.9 5 2 5.9 2 7V18C2 19.1 2.9 20 4 20H20C21.1 20 22 19.1 22 18V7C22 5.9 21.1 5 20 5H16.5L15 3H9Z"/>
    <circle cx="12" cy="12" r="3.5"/>
  </svg>

  Fotoğraf Yükle

</button>

    <p id="uploadStatus"></p>

  </section>


  <!-- =========================
       GALERİ
  ========================== -->

  <section class="gallery-section">

    <h2>Anılarımız ❤️</h2>

    <div id="photoGallery">

      <div class="loading">

        Fotoğraflar yükleniyor...

      </div>

    </div>

  </section>


  <!-- =========================
       LIGHTBOX
  ========================== -->

  <div id="lightbox">

    <span id="closeLightbox">

      &times;

    </span>

    <img
      id="lightboxImage"
      src=""
      alt="Fotoğraf">

  </div>


  <!-- =========================
       SCRIPT
  ========================== -->

  <script
    type="module"
    src="script.js">
  </script>

</body>

</html>
