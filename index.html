<!DOCTYPE html>
<html lang="tr">

<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Buse & Samet</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <!-- Başlık -->

    <section class="hero">

        <p class="small-title">
            Mutluluğumuzu Paylaşmaya Davetlisiniz
        </p>

        <h1>Buse</h1>

        <span class="amp">&</span>

        <h1>Samet</h1>

        <div class="line"></div>

        <p class="date">
            19 Eylül 2026
        </p>

    </section>


    <!-- Fotoğraf Yükleme -->

    <section class="card">

        <h2>Düğün Fotoğraf Albümü</h2>

        <p>
            Bu özel günümüzde çektiğiniz
            fotoğrafları bizimle paylaşabilirsiniz.
        </p>

        <input
            type="file"
            id="fileInput"
            accept="image/*"
            hidden
        >

        <button id="uploadBtn">

            📸 Fotoğraf Yükle

        </button>

        <p id="uploadStatus"></p>

    </section>



    <!-- Galeri -->

    <section class="gallery">

        <h2>Anılarımız ❤️</h2>

        <div id="photoGallery">

            <div class="loading">

                Fotoğraflar yükleniyor...

            </div>

        </div>

    </section>



    <!-- Footer -->

    <footer>

        Sevgiyle...

    </footer>
<div id="lightbox">
  <span id="closeLightbox">×</span>
  <img id="lightboxImage">
</div>

<script type="module" src="script.js"></script>

</body>
</html>
