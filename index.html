<!DOCTYPE html>
<html lang="tr">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Buse & Samet</title>

  <link rel="stylesheet" href="style.css">

</head>

<body>

  <!-- =========================
       ÜST ALAN
  ========================== -->

  <header class="hero">

    <p class="welcome">
      Mutluluğumuza ortak olduğunuz için teşekkür ederiz.
    </p>

    <h1>Buse</h1>

    <div class="ampersand">&</div>

    <h1>Samet</h1>

    <p class="date">
      19 Eylül 2026
    </p>

  </header>


  <!-- =========================
       FOTOĞRAF YÜKLEME
  ========================== -->

  <section class="upload-section">

    <h2>Düğün Fotoğraf Albümü</h2>

    <p class="description">
      Bu özel günümüzde çektiğiniz fotoğrafları
      bizimle paylaşabilirsiniz.
    </p>

    <input
      type="file"
      id="fileInput"
      accept="image/*">

    <button id="uploadBtn">
      📸 Fotoğraf Yükle
    </button>

    <p id="uploadStatus"></p>

  </section>


  <!-- =========================
       GALERİ
  ========================== -->

  <section class="gallery-section">

    <h2>Anılarımız ❤️</h2>

    <div id="photoGallery">

      <div class="loading">

        Fotoğraflar yükleniyor...

      </div>

    </div>

  </section>


  <!-- =========================
       LIGHTBOX
  ========================== -->

  <div id="lightbox">

    <span id="closeLightbox">

      &times;

    </span>

    <img
      id="lightboxImage"
      src=""
      alt="Fotoğraf">

  </div>


  <!-- =========================
       SCRIPT
  ========================== -->

  <script
    type="module"
    src="script.js">
  </script>

</body>

</html>
